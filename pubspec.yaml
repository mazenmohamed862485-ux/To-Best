name: to_best
description: TO Best — Professional Training & Nutrition App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # HTTP & Networking
  http: ^1.2.2
  connectivity_plus: ^6.0.3

  # Local Storage
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3
  shared_preferences: ^2.3.1
  flutter_secure_storage: ^9.2.2

  # UI Components
  fl_chart: ^0.68.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  photo_view: ^0.15.0
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # Video Player
  webview_flutter: ^4.8.0
  url_launcher: ^6.3.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.2
  crypto: ^3.0.5
  encrypt: ^5.0.3
  permission_handler: ^11.3.1

  # Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.11

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
