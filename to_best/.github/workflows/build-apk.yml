name: Build Flutter APK

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

defaults:
  run:
    working-directory: to_best

jobs:
  build-debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Show project structure
        run: |
          echo "=== AndroidManifest.xml ==="
          cat android/app/src/main/AndroidManifest.xml
          echo ""
          echo "=== MainActivity.kt ==="
          cat android/app/src/main/kotlin/com/tobest/app/MainActivity.kt
          echo ""
          echo "=== android/build.gradle ==="
          cat android/build.gradle
          echo ""
          echo "=== android/settings.gradle ==="
          cat android/settings.gradle

      - name: Analyze code
        run: flutter analyze --no-fatal-infos || true

      - name: Build Debug APK (verbose)
        run: flutter build apk --debug --verbose 2>&1 || true

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.run_number }}
          path: to_best/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
