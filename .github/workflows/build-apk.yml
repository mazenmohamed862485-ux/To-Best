name: Build Flutter APK

  on:
    push:
      branches: [main, master, develop]
    pull_request:
      branches: [main, master]
    workflow_dispatch:

  jobs:
    build-debug-apk:
      name: Build Debug APK
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Java 17
          uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: "17"

        - name: Set up Flutter
          uses: subosito/flutter-action@v2
          with:
            flutter-version: "3.24.0"
            channel: stable
            cache: true

        - name: Create local.properties
          run: |
            echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
            echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
            echo "flutter.versionName=1.0.0" >> android/local.properties
            echo "flutter.versionCode=1" >> android/local.properties
            cat android/local.properties

        - name: Get dependencies
          run: flutter pub get

        - name: Analyze code
          run: flutter analyze --no-fatal-infos || true

        - name: Build Debug APK
          run: flutter build apk --debug --verbose

        - name: Find APK output
          if: always()
          run: |
            echo "=== Looking for APKs under build/ ==="
            find build -name "*.apk" 2>/dev/null || echo "No APKs found in build/"
            echo "=== flutter-apk dir ==="
            ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "flutter-apk dir missing"
            echo "=== traditional apk dir ==="
            ls -la build/app/outputs/apk/debug/ 2>/dev/null || echo "apk/debug dir missing"

        - name: Upload Debug APK
          uses: actions/upload-artifact@v4
          with:
            name: app-debug-${{ github.run_number }}
            path: build/app/outputs/flutter-apk/app-debug.apk
            retention-days: 30

    build-release-apk:
      name: Build Release APK
      runs-on: ubuntu-latest
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Java 17
          uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: "17"

        - name: Set up Flutter
          uses: subosito/flutter-action@v2
          with:
            flutter-version: "3.24.0"
            channel: stable
            cache: true

        - name: Create local.properties
          run: |
            echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
            echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
            echo "flutter.versionName=1.0.0" >> android/local.properties
            echo "flutter.versionCode=1" >> android/local.properties

        - name: Get dependencies
          run: flutter pub get

        - name: Build Release APK (unsigned)
          run: |
            flutter build apk \
              --release \
              --target-platform android-arm,android-arm64,android-x64 \
              --split-per-abi

        - name: Find APK output
          if: always()
          run: |
            echo "=== Looking for APKs under build/ ==="
            find build -name "*.apk" 2>/dev/null || echo "No APKs found in build/"
            echo "=== flutter-apk dir ==="
            ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "flutter-apk dir missing"
            echo "=== traditional apk dir ==="
            ls -la build/app/outputs/apk/release/ 2>/dev/null || echo "apk/release dir missing"

        - name: Upload Release APKs
          uses: actions/upload-artifact@v4
          with:
            name: app-release-${{ github.run_number }}
            path: build/app/outputs/flutter-apk/*.apk
            retention-days: 30
  